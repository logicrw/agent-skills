interface:
  display_name: "X Research"
  short_description: "Research X/Twitter discourse through Grok MCP Gateway"
  default_prompt: "Use $x-research-skill to search X/Twitter discourse with explicit dates and primary-source verification."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
