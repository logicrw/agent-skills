interface:
  display_name: "Sumink Canvas Agent"
  short_description: "Operate Sumink cards and canvases for human-agent visual writing"
  default_prompt: "Use $sumink-canvas-agent to create, edit, relate, read back, and draft from Sumink notes and canvases."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
