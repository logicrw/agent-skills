interface:
  display_name: "Obsidian Canvas Card Writing"
  short_description: "Use Obsidian Markdown cards and Canvas maps for visual writing"
  default_prompt: "Use $obsidian-canvas-card-writing to create, link, group, read back, and draft from Obsidian Markdown cards and Canvas boards."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
